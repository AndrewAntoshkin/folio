        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Google Sans', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            -webkit-font-smoothing: antialiased;
        }

        #root {
            min-height: 100vh;
        }

        button, [role="button"] {
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        button:active, [role="button"]:active {
            transform: scale(0.95);
        }

        .menu-btn {
            display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
            width: 40px; height: 40px; border: 1px solid #2a2a2a; border-radius: 8px;
            background: #111; color: #e5e5e5; cursor: pointer;
            align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent; padding: 0;
            transition: left .25s ease;
        }
        .menu-btn.open { left: 252px; }
        .menu-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; }
        .menu-btn line { transition: transform .25s ease, opacity .2s ease; transform-origin: 12px 12px; }
        .menu-btn.open .line1 { transform: rotate(45deg); }
        .menu-btn.open .line2 { opacity: 0; }
        .menu-btn.open .line3 { transform: rotate(-45deg); }
        .menu-btn:active { transform: none; }
        .mobile-backdrop {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.6); z-index: 99;
            -webkit-tap-highlight-color: transparent;
        }
        .mobile-backdrop.open { display: block; }

        @media (max-width: 800px) {
            .menu-btn { display: flex; }
            .mobile-sidebar { transform: translateX(-100%); transition: transform .25s ease; }
            .mobile-sidebar.open { transform: translateX(0); }
            .spacer-col { display: none; }
            body { overflow-x: hidden; }
            #root { overflow-x: hidden; max-width: 100vw; }
            main { padding: 76px 16px 48px !important; }
            article { max-width: 100% !important; overflow-x: hidden; }
            pre { white-space: pre-wrap !important; word-break: break-all !important; font-size: 11px !important; }
            code { word-break: break-all; }
            h1 { font-size: 20px !important; }
            section > div { max-width: 100%; overflow-x: auto; }
        }
